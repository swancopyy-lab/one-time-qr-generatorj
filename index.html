<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مولد باركود الدعوة مرة واحدة</title>
<style>
body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    padding: 20px; 
}

input, button { 
    padding: 10px; 
    margin: 5px; 
    font-size: 16px; 
}

#qrcodes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    justify-items: center;
    margin-top: 20px;
}

.qr-item { 
    text-align: center; 
}

.qr-item canvas {
    width: 80vw; /* 80% من عرض الجهاز */
    max-width: 200px;
    height: auto;
}
</style>
</head>
<body>
<h2>اكتب اسمك للحصول على QR Code</h2>
<label>اسم الضيف:</label>
<input type="text" id="name" placeholder="اكتب اسمك" required><br>
<label>عدد QR Codes:</label>
<input type="number" id="guestCount" placeholder="عدد QR Codes" required><br>
<button id="generateBtn">توليد QR Codes</button>
<div id="qrcodes"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
// دالة لتحويل الاسم إلى رقم ثابت
function hashString(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash = hash & hash;
    }
    return Math.abs(hash);
}

document.getElementById('generateBtn').addEventListener('click', function() {
    var name = document.getElementById('name').value.trim();
    var guestCount = parseInt(document.getElementById('guestCount').value);
    var eventName = "حفلة تخرج أحمد"; // اسم المناسبة محدد مسبقًا

    if(!name || isNaN(guestCount) || guestCount <= 0){
        alert('ادخل كل القيم بشكل صحيح');
        return;
    }

    var container = document.getElementById('qrcodes');
    container.innerHTML = '';

    for(var i = 1; i <= guestCount; i++){
        // توليد ID ثابت لكل اسم
        var id = hashString(name + '_' + i);

        var link = 'https://script.google.com/macros/AKfycbyXsIznRJB3KjUZbdnOediZJAQoUTIQ4_nHe-43iFLbVtuhoG8XZMJnU8QFexb86wfHmQ/exec?id=' 
                    + id + '&name=' + encodeURIComponent(name) + '&event=' + encodeURIComponent(eventName);

        var div = document.createElement('div');
        div.className = 'qr-item';
        var qr = document.createElement('canvas');
        new QRious({ element: qr, value: link, size: 200 });
        var label = document.createElement('div');
        label.innerText = 'QR للضيف #' + i;
        div.appendChild(qr);
        div.appendChild(label);
        container.appendChild(div);
    }
});
</script>
</body>
</html>
